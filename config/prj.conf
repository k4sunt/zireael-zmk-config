# Enable ZMK Studio support
CONFIG_ZMK_STUDIO=y

# Enable USB CDC ACM for ZMK Studio communication
CONFIG_USB_CDC_ACM=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=1024
CONFIG_USB_CDC_ACM_DEVICE_NAME="CDC_ACM_0"

# Enable logging for debugging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable console output
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Enable USB device support
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Dao Keyboard"
CONFIG_USB_DEVICE_MANUFACTURER="ZMK"

# Enable Bluetooth (if needed)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_DIS=y
CONFIG_BT_GATT_DIS_MODEL="Dao"
CONFIG_BT_GATT_DIS_MANUF="ZMK"

# Enable battery monitoring
CONFIG_ADC=y
CONFIG_ZMK_BATTERY_REPORTING=y

# Enable RGB LED support (if your board has RGB)
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y 